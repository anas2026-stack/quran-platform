<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقرأة النخبة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-size: 65px;
            --font-family: 'Amiri Quran', serif;
            --font-weight: 400;
            --bg-color: #faf8f5; /* لون ورق المصحف الطبيعي */
            --text-color: #1a1c20;
            --highlight-bg: rgba(212, 175, 55, 0.15); /* ذهبي خفيف جداً افتراضي */
            --error-color: #8b0000; /* عنابي فاخر للخطأ */
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.8) 0%, rgba(250,248,245,1) 100%);
        }

        /* زر الإعدادات العائم والأنيق */
        .settings-toggle {
            position: fixed; top: 20px; right: 20px;
            width: 45px; height: 45px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 50%;
            cursor: pointer; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: #555;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            opacity: 0.5;
        }
        .settings-toggle:hover { opacity: 1; transform: rotate(90deg); }

        /* شريط التحكم (مخفي افتراضياً) */
        .premium-toolbar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 15px 30px; box-sizing: border-box;
            display: flex; justify-content: center; gap: 20px; align-items: center;
            z-index: 1000;
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        .premium-toolbar.visible { transform: translateY(0); }

        .btn {
            background: transparent; border: 1px solid #ddd; padding: 8px 20px;
            border-radius: 30px; cursor: pointer; font-family: 'Tajawal', sans-serif;
            font-weight: 600; font-size: 14px; color: #333; transition: all 0.2s;
        }
        .btn:hover { background: #f5f5f5; border-color: #ccc; }
        .btn-gold { background: #d4af37; color: white; border: none; }
        .btn-gold:hover { background: #c5a030; }

        select, input[type="color"], input[type="range"] {
            padding: 8px 15px; border-radius: 30px; border: 1px solid #ddd;
            font-family: 'Tajawal'; font-weight: 600; outline: none; background: transparent; cursor: pointer;
        }
        .tracker-tool { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.02); padding: 5px 15px; border-radius: 30px; }
        input[type="color"] { width: 30px; height: 30px; padding: 0; border: none; border-radius: 50%; overflow: hidden; }

        /* منطقة القراءة الفاخرة */
        .quran-container {
            width: 100%; max-width: 1200px; margin: 0 auto;
            padding: 100px 20px 150px 20px; box-sizing: border-box;
            text-align: center;
        }

        .surah-title {
            font-family: 'Reem Kufi', sans-serif; font-size: 45px; color: #b89736;
            margin-bottom: 15px; font-weight: 600;
        }
        
        /* البسملة المستقلة */
        .basmalah {
            font-family: 'Amiri Quran', serif; font-size: 35px; color: #333;
            margin-bottom: 50px; position: relative; padding-bottom: 30px;
        }
        .basmalah::after {
            content: '❁'; position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%); font-size: 20px; color: #d4af37; opacity: 0.6;
        }

        .quran-text {
            font-family: var(--font-family); font-size: var(--font-size);
            font-weight: var(--font-weight); line-height: 2.2; direction: rtl;
            transition: opacity 0.3s ease;
        }

        /* وضع التركيز (Focus Mode) - تبهيت النص غير النشط */
        .quran-text.reading-mode .word { opacity: 0.5; }

        /* التتبع العبقري (Pop Effect) */
        .word {
            display: inline-block; margin: 0 4px; padding: 0 8px; border-radius: 8px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .word.highlight {
            opacity: 1 !important;
            background-color: var(--dynamic-highlight);
            transform: scale(1.12) translateY(-3px); /* التكبير والبروز القوي والأنيق */
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); /* ظل ناعم للبروز */
            color: #000;
        }

        /* تصميم الخطأ (احترافي جداً) */
        .word.mistake {
            opacity: 1 !important;
            color: var(--error-color) !important;
            background-color: rgba(139, 0, 0, 0.03) !important;
            border-bottom: 2px dashed rgba(139, 0, 0, 0.5);
            transform: scale(1.05);
        }

        /* الفهرس الجانبي (نظام الأجزاء) */
        .sidebar {
            position: fixed; top: 0; right: -350px; width: 320px; height: 100%;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
            border-left: 1px solid rgba(0,0,0,0.05); box-shadow: -10px 0 30px rgba(0,0,0,0.03);
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1001; padding: 30px; overflow-y: auto; box-sizing: border-box;
        }
        .sidebar.open { right: 0; }
        
        .juz-header {
            background: #fcfcfc; border: 1px solid #eee; padding: 12px 15px; margin-top: 10px;
            border-radius: 8px; font-family: 'Tajawal'; font-weight: 700; cursor: pointer;
            display: flex; justify-content: space-between; color: #2c3e50;
        }
        .juz-header:hover { background: #f5f5f5; }
        .juz-content { display: none; padding: 10px 5px; }
        .juz-content.active { display: block; }

        .surah-item {
            padding: 10px 15px; margin-bottom: 5px; background: transparent;
            border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between;
            font-family: 'Tajawal'; font-weight: 500; font-size: 15px; color: #555; transition: 0.2s;
        }
        .surah-item:hover { background: rgba(212, 175, 55, 0.05); color: #b89736; padding-right: 20px; }

        /* لوحة الإضافة */
        .admin-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 600px; background: #fff; padding: 40px; border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1); z-index: 2000;
        }
        .admin-panel.active { display: block; }
        .admin-panel input, .admin-panel select, .admin-panel textarea {
            width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 12px;
            border: 1px solid #eaeaea; border-radius: 8px; font-family: 'Tajawal'; direction: rtl;
            background: #fafafa;
        }
        .admin-panel textarea { height: 180px; resize: none; line-height: 1.6; }

        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); z-index: 1000; }
        .overlay.active { display: block; }

    </style>
</head>
<body>

    <!-- زر الواجهة الدائري الأنيق -->
    <div class="settings-toggle" onclick="toggleToolbar()" title="إعدادات المقرأة">⚙️</div>

    <!-- شريط التحكم العلوي -->
    <div class="premium-toolbar" id="toolbar">
        <button class="btn" onclick="toggleSidebar()">قائمة السور</button>
        <button class="btn btn-gold" onclick="toggleAdminPanel()">+ إضافة نص</button>
        
        <div class="tracker-tool">
            <span style="font-size: 12px; font-weight: 600; color: #777;">لون التتبع:</span>
            <input type="color" id="trackColor" value="#d4af37" onchange="updateTracker()">
            <input type="range" id="trackOpacity" min="0.05" max="0.5" step="0.05" value="0.15" onchange="updateTracker()">
        </div>

        <select id="fontSelector" onchange="updateStyles()">
            <option value="'Amiri Quran', serif">خط المصحف (Amiri)</option>
            <option value="'Reem Kufi', sans-serif">خط كوفي (Reem Kufi)</option>
            <option value="'Tajawal', sans-serif">خط عصري (Tajawal)</option>
        </select>
        
        <button class="btn" onclick="changeFontSize(5)">تكبير A+</button>
        <button class="btn" onclick="changeFontSize(-5)">تصغير A-</button>
        <button class="btn" onclick="toggleToolbar()" style="border:none; color:#999;">إخفاء ✕</button>
    </div>

    <!-- الفهرس الجانبي (منظم بالأجزاء) -->
    <div class="sidebar" id="sidebar">
        <h2 style="font-family:'Reem Kufi'; color:#1a1c20; margin-top:0;">مكتبة النصوص</h2>
        <div id="juzContainer"></div>
    </div>

    <!-- لوحة إضافة النصوص -->
    <div class="overlay" id="overlay" onclick="closeModals()"></div>
    <div class="admin-panel" id="adminPanel">
        <h2 style="font-family:'Reem Kufi'; text-align:center; color:#b89736;">إدراج نص جديد</h2>
        
        <select id="juzSelect">
            <option value="" disabled selected>اختر الجزء (لتنظيم الفهرس)...</option>
            <script>
                for(let i=1; i<=30; i++) document.write(`<option value="${i}">الجزء ${i}</option>`);
            </script>
        </select>
        
        <input type="text" id="newSurahTitle" placeholder="اسم السورة (مثال: سورة النبأ)">
        <textarea id="newSurahText" placeholder="الصق النص القرآني هنا (بدون البسملة)..."></textarea>
        
        <button class="btn btn-gold" style="width:100%; font-size:16px; padding:15px;" onclick="saveNewSurah()">حفظ النص</button>
    </div>

    <!-- مساحة القراءة الفاخرة -->
    <div class="quran-container">
        <!-- اسم السورة -->
        <div class="surah-title" id="displayTitle"></div>
        
        <!-- البسملة المستقلة (مفصولة هندسياً ولن يتم تتبعها) -->
        <div class="basmalah" id="displayBasmalah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        
        <!-- النص القرآني -->
        <div class="quran-text" id="displayText"></div>
    </div>

    <script>
        // قاعدة البيانات المحدثة (تدعم الأجزاء)
        let defaultData = [
            { juz: 30, title: "سورة النبأ", text: "عَمَّ يَتَسَاءَلُونَ (1) عَنِ النَّبَإِ الْعَظِيمِ (2) الَّذِي هُمْ فِيهِ مُخْتَلِفُونَ (3) كَلَّا سَيَعْلَمُونَ (4) ثُمَّ كَلَّا سَيَعْلَمُونَ (5)" },
            { juz: 30, title: "سورة النازعات", text: "وَالنَّازِعَاتِ غَرْقًا (1) وَالنَّاشِطَاتِ نَشْطًا (2) وَالسَّابِحَاتِ سَبْحًا (3) فَالسَّابِقَاتِ سَبْقًا (4)" }
        ];

        let quranData = JSON.parse(localStorage.getItem('myQuranProData')) || defaultData;
        let currentWordIndex = -1;
        let activeWords = [];

        function toggleToolbar() { document.getElementById('toolbar').classList.toggle('visible'); }

        // تحويل اللون للتحكم بالشفافية
        function hexToRGBA(hex, opacity) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        }

        function updateTracker() {
            const color = document.getElementById('trackColor').value;
            const opac = document.getElementById('trackOpacity').value;
            document.documentElement.style.setProperty('--dynamic-highlight', hexToRGBA(color, opac));
        }

        function updateStyles() { document.documentElement.style.setProperty('--font-family', document.getElementById('fontSelector').value); }

        let currentFontSize = 65;
        function changeFontSize(change) {
            currentFontSize += change;
            if(currentFontSize < 40) currentFontSize = 40; if(currentFontSize > 120) currentFontSize = 120;
            document.documentElement.style.setProperty('--font-size', currentFontSize + 'px');
        }

        // بناء الفهرس بنظام الأجزاء (الأكورديون)
        function renderIndex() {
            const container = document.getElementById('juzContainer');
            container.innerHTML = '';
            
            // تجميع السور حسب الجزء
            let grouped = {};
            quranData.forEach((surah, index) => {
                if(!grouped[surah.juz]) grouped[surah.juz] = [];
                grouped[surah.juz].push({ ...surah, originalIndex: index });
            });

            // ترتيب الأجزاء تصاعدياً
            let sortedJuz = Object.keys(grouped).sort((a,b) => a - b);

            sortedJuz.forEach(juzNum => {
                let juzDiv = document.createElement('div');
                juzDiv.innerHTML = `<div class="juz-header" onclick="toggleJuz(${juzNum})">الجزء ${juzNum} <span>▼</span></div>
                                    <div class="juz-content" id="juz-${juzNum}"></div>`;
                container.appendChild(juzDiv);

                let contentDiv = juzDiv.querySelector('.juz-content');
                grouped[juzNum].forEach(surah => {
                    let item = document.createElement('div');
                    item.className = 'surah-item';
                    item.innerHTML = `<span onclick="loadSurah(${surah.originalIndex})">${surah.title}</span>
                                      <span onclick="deleteSurah(${surah.originalIndex})" style="color:#ccc;">×</span>`;
                    contentDiv.appendChild(item);
                });
            });
        }

        function toggleJuz(juzNum) {
            const content = document.getElementById(`juz-${juzNum}`);
            content.classList.toggle('active');
        }

        function saveNewSurah() {
            const juz = document.getElementById('juzSelect').value;
            const title = document.getElementById('newSurahTitle').value.trim();
            let text = document.getElementById('newSurahText').value.trim();
            
            if(!juz || !title || !text) return alert("يرجى ملء جميع الحقول (الجزء، الاسم، النص)");
            
            // إزالة البسملة إذا قام المستخدم بنسخها بالخطأ لتفادي التكرار
            text = text.replace(/بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ/g, '').trim();

            quranData.push({ juz: parseInt(juz), title: title, text: text });
            localStorage.setItem('myQuranProData', JSON.stringify(quranData));
            
            document.getElementById('newSurahTitle').value = ''; document.getElementById('newSurahText').value = '';
            closeModals(); renderIndex(); loadSurah(quranData.length - 1);
        }

        function deleteSurah(index) {
            if(confirm('حذف هذا النص؟')) {
                quranData.splice(index, 1);
                localStorage.setItem('myQuranProData', JSON.stringify(quranData));
                renderIndex(); if(quranData.length > 0) loadSurah(0);
            }
        }

        function loadSurah(index) {
            const surah = quranData[index];
            if(!surah) return;
            
            document.getElementById('displayTitle').innerText = surah.title;
            // إخفاء البسملة إذا كانت سورة التوبة (الجزء 10 كمثال تقريبي)
            document.getElementById('displayBasmalah').style.display = (surah.title.includes('التوبة')) ? 'none' : 'block';
            
            const textContainer = document.getElementById('displayText');
            textContainer.innerHTML = ''; 
            textContainer.classList.remove('reading-mode'); // إلغاء وضع التركيز مبدئياً
            
            let words = surah.text.split(/\s+/);
            activeWords = []; currentWordIndex = -1;

            words.forEach(word => {
                if(word.trim() === '') return;
                let span = document.createElement('span');
                span.className = 'word'; span.innerText = word;
                textContainer.appendChild(span);
                activeWords.push(span);
            });
            closeModals();
        }

        // محرك التتبع الفاخر
        document.addEventListener('keydown', function(event) {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(event.code)) event.preventDefault();
            if (activeWords.length === 0) return;

            const textContainer = document.getElementById('displayText');

            if (event.key === 'ArrowLeft') { 
                if (currentWordIndex < activeWords.length - 1) {
                    textContainer.classList.add('reading-mode'); // تفعيل وضع التركيز (تبهيت الباقي)
                    if (currentWordIndex >= 0) activeWords[currentWordIndex].classList.remove('highlight');
                    currentWordIndex++;
                    activeWords[currentWordIndex].classList.add('highlight');
                    activeWords[currentWordIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } 
            else if (event.key === 'ArrowRight') { 
                if (currentWordIndex > 0) {
                    activeWords[currentWordIndex].classList.remove('highlight');
                    currentWordIndex--;
                    activeWords[currentWordIndex].classList.add('highlight');
                    activeWords[currentWordIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else if (currentWordIndex === 0) {
                    activeWords[currentWordIndex].classList.remove('highlight');
                    currentWordIndex = -1;
                    textContainer.classList.remove('reading-mode'); // إلغاء وضع التركيز
                }
            }
            // التقييم (الخطأ باللون العنابي الأنيق)
            else if (event.key === 'ArrowDown') { 
                if(currentWordIndex >= 0) activeWords[currentWordIndex].classList.add('mistake');
            }
            else if (event.key === 'ArrowUp') { 
                if(currentWordIndex >= 0) activeWords[currentWordIndex].classList.remove('mistake');
            }
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); document.getElementById('adminPanel').classList.remove('active'); document.getElementById('toolbar').classList.remove('visible'); }
        function toggleAdminPanel() { document.getElementById('adminPanel').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); document.getElementById('sidebar').classList.remove('open'); document.getElementById('toolbar').classList.remove('visible');}
        function closeModals() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('adminPanel').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }

        renderIndex(); updateTracker(); if(quranData.length > 0) loadSurah(0);
    </script>
</body>
</html>
